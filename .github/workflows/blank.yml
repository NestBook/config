# config/.github/workflows/actions.yml
name: CI/CD Pipeline

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build:
    name: Build
    runs-on:
      group: build
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:${{ github.sha }} .

  push:
    name: Push
    runs-on:
      group: build
    needs: build
    steps:
      - name: Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:${{ github.sha }}
          docker tag  ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:${{ github.sha }} \
                      ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:latest

      - name: Logout
        if: always()
        run: docker logout

  deploy:
    name: Deploy
    runs-on:
      group: production
    if: startsWith(github.ref, 'refs/tags/')
    environment: production
    steps:
      - name: Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Deploy
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:latest
          docker stop ${{ inputs.service_name }} || true
          docker rm   ${{ inputs.service_name }} || true
          docker run -d \
            --name    ${{ inputs.service_name }} \
            --restart always \
            --network nestbook-net \
            -e APP_PORT=${{ vars.APP_PORT }} \
            -e DB_HOST=${{ vars.DB_HOST }} \
            -e DB_PORT=${{ vars.DB_PORT }} \
            -e DB_USERNAME=${{ vars.DB_USERNAME }} \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e DB_DATABASE=${{ vars.DB_DATABASE }} \
            -e S3_REGION=${{ vars.S3_REGION }} \
            -e S3_ENDPOINT=${{ vars.S3_ENDPOINT }} \
            -e S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }} \
            -e S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }} \
            -e S3_BUCKET=${{ vars.S3_BUCKET }} \
            -e S3_FORCE_PATH_STYLE=${{ vars.S3_FORCE_PATH_STYLE }} \
            -e REDIS_HOST=${{ vars.REDIS_HOST }} \
            -e REDIS_PORT=${{ vars.REDIS_PORT }} \
            -e REDIS_USERNAME=${{ vars.REDIS_USERNAME }} \
            -e REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }} \
            -e LOG_OUT_DIR=${{ vars.LOG_OUT_DIR }} \
            -e LOG_LEVEL=${{ vars.LOG_LEVEL }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:latest

      - name: Logout
        if: always()
        run: docker logout
