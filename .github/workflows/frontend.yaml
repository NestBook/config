name: CI/CD Pipeline Frontend

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string

jobs:
  build:
    name: Build
    runs-on:
      group: build
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:${{ github.sha }} .

  push:
    name: Push
    runs-on:
      group: build
    needs: build
    steps:
      - name: Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:${{ github.sha }}
          docker tag  ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:${{ github.sha }} \
                      ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:latest

      - name: Logout
        if: always()
        run: docker logout

  deploy:
    name: Deploy
    runs-on:
      group: production
    if: startsWith(github.ref, 'refs/tags/')
    environment: production
    steps:
      - name: Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Deploy
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:latest
          docker stop ${{ inputs.service_name }} || true
          docker rm   ${{ inputs.service_name }} || true
          docker run -d \
            --name    ${{ inputs.service_name }} \
            --restart always \
            -p 80:80 \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:latest

      - name: Logout
        if: always()
        run: docker logout
